services:
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: biker-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biker}
      POSTGRES_DB: ${POSTGRES_DB:-biker_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biker} -d ${POSTGRES_DB:-biker_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
